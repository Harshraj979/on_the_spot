<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login or Register — On The Spot accident and insurance platform." />
  <title>Login — On The Spot</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="auth-body">

  <div class="auth-bg" aria-hidden="true">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-grid"></div>
  </div>

  <div class="auth-wrapper">
    <a href="index.html" class="nav-brand auth-brand" aria-label="On The Spot Home">
      <div class="nav-logo-icon">🚨</div>
      <span>On The Spot</span>
    </a>

    <div class="auth-card card-glass animate-fade-up">
      <!-- Tabs -->
      <div class="auth-tabs" role="tablist" aria-label="Login or Register">
        <button class="auth-tab active" role="tab" aria-selected="true" aria-controls="loginPanel" id="loginTabBtn">Sign In</button>
        <button class="auth-tab" role="tab" aria-selected="false" aria-controls="registerPanel" id="registerTabBtn">Register</button>
      </div>

      <!-- ── Login Panel ── -->
      <div class="auth-panel active" id="loginPanel" role="tabpanel" aria-labelledby="loginTabBtn">
        <form id="loginForm" novalidate aria-label="Login form">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address <span class="required">*</span></label>
            <input type="email" class="form-control" id="loginEmail" name="email"
              placeholder="you@example.com" required autocomplete="email" />
            <p class="form-error" id="loginEmailError"></p>
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">
              Password <span class="required">*</span>
              <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot?</a>
            </label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="loginPassword" name="password"
                placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="password-toggle" id="toggleLoginPw" aria-label="Toggle password visibility">👁</button>
            </div>
            <p class="form-error" id="loginPasswordError"></p>
          </div>

          <div class="auth-remember">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" name="rememberMe" />
              <span class="checkbox-custom"></span>
              Remember me for 7 days
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-lg auth-submit-btn" id="loginSubmitBtn">
            Sign In →
          </button>

        </form>
      </div>

      <!-- ── Register Panel ── -->
      <div class="auth-panel" id="registerPanel" role="tabpanel" aria-labelledby="registerTabBtn" hidden>
        <form id="registerForm" novalidate aria-label="Registration form">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="regName">Full Name <span class="required">*</span></label>
              <input type="text" class="form-control" id="regName" name="name"
                placeholder="Rahul Sharma" required minlength="2" autocomplete="name" />
              <p class="form-error" id="regNameError"></p>
            </div>
            <div class="form-group">
              <label class="form-label" for="regPhone">Phone Number</label>
              <input type="tel" class="form-control" id="regPhone" name="phone"
                placeholder="+91 9876543210" autocomplete="tel" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="regEmail">Email Address <span class="required">*</span></label>
            <input type="email" class="form-control" id="regEmail" name="email"
              placeholder="you@example.com" required autocomplete="email" />
            <p class="form-error" id="regEmailError"></p>
          </div>

          <div class="form-group">
            <label class="form-label" for="regPassword">Password <span class="required">*</span></label>
            <div class="password-wrap">
              <input type="password" class="form-control" id="regPassword" name="password"
                placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password" />
              <button type="button" class="password-toggle" id="toggleRegPw" aria-label="Toggle password">👁</button>
            </div>
            <div class="password-strength" id="passwordStrength" aria-live="polite">
              <div class="strength-bar" id="strengthBar"></div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
            <p class="form-error" id="regPasswordError"></p>
          </div>



          <div class="form-group">
            <label class="checkbox-label" for="agreeRegTerms">
              <input type="checkbox" id="agreeRegTerms" required />
              <span class="checkbox-custom"></span>
              I agree to the <a href="#" style="color:var(--clr-primary-light)">Terms of Service</a>
              and <a href="#" style="color:var(--clr-primary-light)">Privacy Policy</a>
              <span class="required">*</span>
            </label>
          </div>

          <button type="submit" class="btn btn-accent btn-lg auth-submit-btn" id="registerSubmitBtn">
            Create Account →
          </button>
        </form>
      </div>
    </div>

    <p class="auth-footer-text">
      By using On The Spot, you agree to our
      <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </p>
  </div>

  <div id="toast-container" role="alert" aria-live="polite"></div>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
